name: cashly
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive_flutter: ^1.1.0
  uuid: ^4.5.2
  fl_chart: ^0.65.0
  http: ^1.1.0
  provider: ^6.1.5+1
  image_picker: ^1.2.1
  intl: ^0.20.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  local_auth: ^2.3.0
  share_plus: ^12.0.1
  file_picker: ^10.3.8
  path_provider: ^2.1.5
  vibration: ^3.1.5
  lottie: ^3.3.1
  pdf: ^3.11.1
  get_it: ^7.6.7
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/image/logokeskinbuyuk.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0D0D0D"
  image: assets/image/seffaflogo.png
  android_12:
    color: "#0D0D0D"
    image: assets/image/seffaflogo.png

flutter:
  uses-material-design: true
  assets:
    - assets/image/
    - assets/lottie/
    - assets/fonts/

  # Yerel fontlar - Offline uyumluluk için
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
