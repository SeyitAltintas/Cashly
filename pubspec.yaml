name: cashly
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  hive_flutter: ^1.1.0
  google_fonts: ^6.3.2
  uuid: ^4.5.2
  fl_chart: ^0.65.0
  http: ^1.1.0
  provider: ^6.1.5+1
  image_picker: ^1.2.1
  intl: ^0.20.2
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  local_auth: ^2.3.0
  share_plus: ^12.0.1
  file_picker: ^10.3.8
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/image/logokeskin.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/image/
