name: Cashly Flutter Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: # Manuel tetikleme için

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Aşama: Kod Kalitesi, Format ve Unit/Widget Testler
  analyze-and-test:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.24.0' # Sabit versiyon önerilir

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🖌️ Verify Code Formatting (Dart Format)
        run: dart format --output=none --set-exit-if-changed .

      - name: 🧐 Code Analysis (Lint)
        run: flutter analyze --no-fatal-infos

      - name: 🧪 Unit & Widget Tests
        run: flutter test --coverage --reporter=github

      - name: 🌍 Upload Test Coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # 2. Aşama: Derleme (Sadece commit mesajı "build" içeriyorsa)
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: contains(github.event.head_commit.message, 'build') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.24.0'

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🚀 Build Release APK
        run: flutter build apk --release --no-web-init

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # 3. Aşama: E2E Testleri (Tamamen Optimize Edildi)
  integration-test:
    name: E2E Lifecycle & UI Tests
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'run-e2e') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: ⚙️ Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.24.0'

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🤖 Android Emulator Runner (E2E Tests)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31 # API 29 yerine 31 (Android 12) - daha stabil
          target: google_apis # Google Play Servislerini içerir
          arch: x86_64 # Linux runner için zorunlu
          profile: Nexus 6P # Orta boy cihaz
          cores: 4 # CPU cores sınırla
          ram-size: 2048M # RAM sınırla
          disk-size: 4G # Disk boyutu
          emulator-boot-timeout: 600 # 10 dakika boot süresi
          disable-animations: true # Animasyonları devre dışı bırak (flaky testleri önler)
          script: |
            flutter test integration_test/ \
              --timeout 3600s \
              --reporter=github \
              --verbose
          emulator-options: |
            -no-snapshot-save
            -no-window
            -gpu swiftshaker_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -accel on

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            test-results/
            build/
          retention-days: 7

  # 4. Aşama: Golden Tests (Opsiyonel - UI Snapshot Testleri)
  golden-tests:
    name: Golden Image Tests
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.24.0'

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🎨 Run Golden Tests
        run: flutter test --tags golden --update-goldens=false

      - name: 📤 Upload Golden Diffs (Başarısız olursa)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-diffs
          path: test/goldens/
          retention-days: 7

  # 5. Aşama: Status Check (Tüm Testlerin Tamamlanmasını Bekle)
  final-status-check:
    name: ✅ Final Status Check
    runs-on: ubuntu-latest
    needs: [analyze-and-test, build-android, integration-test]
    if: always()
    
    steps:
      - name: Check Job Status
        run: |
          if [ "${{ needs.analyze-and-test.result }}" != "success" ]; then
            echo "❌ Code Quality & Unit Tests başarısız!"
            exit 1
          fi
          
          if [ "${{ needs.build-android.result }}" == "failure" ]; then
            echo "⚠️ Build başarısız (tetiklenmemiş olabilir)"
          fi
          
          if [ "${{ needs.integration-test.result }}" == "failure" ]; then
            echo "❌ E2E Testleri başarısız!"
            exit 1
          fi
          
          echo "✅ Tüm görevler başarılı!"