name: Cashly Flutter Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # 1. Aşama: Kod Kalitesi, Format ve Unit/Widget Testler
  analyze-and-test:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🖌️ Verify Code Formatting (Dart Format)
        run: dart format --output=none --set-exit-if-changed .

      - name: 🧐 Code Analysis (Lint)
        run: flutter analyze --no-fatal-infos

      - name: 🧪 Unit & Widget Tests
        run: flutter test --coverage

      - name: 🌍 Upload Test Coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # 2. Aşama: Derleme (Sadece commit mesajı "build" içeriyorsa)
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: contains(github.event.head_commit.message, 'build')
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # Zulu yerine Temurin (Adoptium) daha yaygın ama Zulu da olur.
          java-version: '17'
          cache: 'gradle'

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🚀 Build Release APK
        run: flutter build apk --release

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # 3. Aşama: E2E Testleri (Linux + KVM ile Optimize Edildi)
  integration-test:
    name: E2E Lifecycle & UI Tests
    runs-on: ubuntu-latest # 🚀 macOS yerine Linux (KVM destekli) daha hızlı ve ucuz.
    needs: analyze-and-test
    # Sadece PR'larda veya özel tetikleyici varsa çalışır.
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'run-e2e')
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: ⚙️ Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🤖 Android Emulator Runner
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29 # 🚀 API 33 yerine 29 (Android 10) çok daha stabil ve hafiftir.
          target: default # 🚀 Google Play servislerine muhtaç değilsen 'default' kullan.
          arch: x86_64 # 🚀 Linux runner için x86_64 şart.
          profile: Nexus 6 # Düşük çözünürlüklü cihaz = daha az GPU yükü.
          ram-size: 2048M
          disk-size: 4G # 8GB CI için çok fazla olabilir, 4GB genelde yeter.
          emulator-boot-timeout: 600 # 10 dakika boot için yeterli, fazlası israf.
          disable-animations: true # 🚀 Testlerin "flaky" olmasını engeller.
          script: flutter test integration_test/ --timeout 3600s
          # -gpu swiftshader_indirect: Headless modda grafik hatalarını önler.
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none