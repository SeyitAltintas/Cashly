# Cashly Flutter CI/CD Pipeline
# Her push ve pull request'te otomatik olarak çalışır

name: Flutter CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Kod Analizi ve Test
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: Kod analizi (flutter analyze)
        run: flutter analyze --no-fatal-infos

      - name: Unit ve Widget testleri
        run: flutter test --coverage

      - name: Test coverage raporu
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # Android Build - Sadece commit mesajında 'build' varsa çalışır
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: contains(github.event.head_commit.message, 'build')
    
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Java kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: APK oluştur (Release)
        run: flutter build apk --release

      - name: APK artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # Entegrasyon Testleri (E2E)
  integration-test:
    name: E2E Integration Tests
    # macOS runner'ları donanım hızlandırmalı emülatörler için daha stabildir
    runs-on: macos-latest
    needs: analyze-and-test
    
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Java kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: Android Emulator Başlat ve Testleri Koştur
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: flutter test integration_test/
          # Hardware acceleration on macOS
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none

