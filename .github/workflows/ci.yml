# Cashly Flutter CI/CD Pipeline
# Her push ve pull request'te otomatik olarak çalışır

name: Flutter CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # Kod Analizi ve Test
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: Kod analizi (flutter analyze)
        run: flutter analyze --no-fatal-infos

      - name: Unit ve Widget testleri
        run: flutter test --coverage

      - name: Test coverage raporu
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # Android Build
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Java kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kurulumu
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: APK oluştur (Release)
        run: flutter build apk --release

      - name: APK artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
