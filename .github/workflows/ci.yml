# Cashly Flutter Enterprise CI/CD Pipeline
# Tüm dal itmelerinde ve Main/Develop çekme isteklerindeki kalite kontrol

name: Flutter CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # 1. Aşama: Kod Kalitesi, Format ve Unit/Widget Testler
  analyze-and-test:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🖌️ Verify Code Formatting (Dart Format)
        run: dart format --output=none --set-exit-if-changed .

      - name: 🧐 Code Analysis (Lint)
        run: flutter analyze --no-fatal-infos

      - name: 🧪 Unit & Widget Tests
        run: flutter test --coverage

      - name: 🌍 Upload Test Coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # 2. Aşama: Derleme (Sadece commit "build" içeriyorsa)
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: contains(github.event.head_commit.message, 'build')
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # 🚀 Gradle için build sürelerini %50 hızlandırır

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🚀 Build Release APK
        run: flutter build apk --release

      - name: 📦 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # 3. Aşama: Maliyetli Emülatör E2E Testleri
  integration-test:
    name: E2E Lifecycle & UI Tests
    runs-on: macos-latest # 🚀 GitHub Ubuntu runner'larında KVM (Nested Virtualization) desteklenmez. Hız için macOS ARM64 kullanılmalı!
    needs: analyze-and-test
    # ⚠️ Emülatörler GitHub Actions için çok uzun sürüyor (Özellikle 55 E2E testi için)
    # Bu adımı sadece PR'larda (Main'e giden kararlı kodlarda) VEYA commit "run-e2e" diyorsa çalıştır.
    if: github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'run-e2e')
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: ⚙️ Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🤖 Android Emulator Runner & 55 Flow Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33 # 🚀 ARM64 için genelde API 33 en stabil ve hızlı olanıdır
          target: google_apis
          arch: arm64-v8a # 🚀 Cihaz macOS M1 (Apple Silicon) olduğu için arm64-v8a mimarisi HVF (Hypervisor Framework) kullanır ve aşırı hızlı çalışır!
          ram-size: 2048M
          disk-size: 8G
          emulator-boot-timeout: 900
          script: flutter test integration_test/ --timeout 3600s
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none

